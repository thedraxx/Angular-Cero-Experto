<h4>Listado</h4>
<ul class="list-group">

  <li class="list-group-item" [ngClass]="{'list-group-item-success' : isLast,
              'list-group-item-danger' : isFirst,
              'list-group-item-primary' : isEven}" *ngFor="
    let character of characterList;
    let i = index; let isFirst = first;
    let isLast = last; let isEven = even;
    let isOdd = odd">

    <span class="text-primary">{{i + 1}}. </span>
    <span>{{ character.name }} - </span>
    <span>{{ character.power }} Ki. </span>
    <span> Es el primero: {{isFirst}}</span>

  </li>

</ul>
