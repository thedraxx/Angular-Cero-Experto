<h4>Agregar Personajes</h4>

<form class="row" (ngSubmit)="emitCharacter()">
  <div class="mb-3">
    <label for="nombre" class="form-label">Nombre</label>
    <input type="text" class="form-control mb-2" id="nombre" [(ngModel)]="character.name" name="name">
  </div>

  <div class="mb-3">
    <label for="poder" class="form-label">Poder</label>
    <input type="number" class="form-control mb-2" id="poder" [(ngModel)]="character.power" name="power">
  </div>

  <button type="submit" class="btn btn-primary">
    Agregar
  </button>

  <!-- {{ character | json}} -->
</form>
