<h4>Agregar Personajes</h4>
<form class="row">
  <div class="mb-3">
    <label for="nombre" class="form-label">Nombre</label>
    <input type="text" class="form-control mb-2" id="nombre">
  </div>

  <div class="mb-3">
    <label for="poder" class="form-label">Poder</label>
    <input type="number" class="form-control mb-2" id="poder">
  </div>

  <button type="submit" class="btn btn-primary">
    Agregar
  </button>
</form>
